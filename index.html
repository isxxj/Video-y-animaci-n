<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --mg: #FF2D6B;
    --cy: #00E5FF;
    --yw: #FFE135;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --txt: #f0f0f0;
    --muted: rgba(240,240,240,0.45);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--txt);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--txt);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--mg);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .counter {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .counter span { color: var(--cy); }

  /* ── VIDEO STAGE ── */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: #000;
  }

  /* YouTube iframe container */
  .yt-container {
    width: 100%;
    height: 100%;
    position: relative;
    display: none;
  }
  .yt-container.active {
    display: block;
  }
  .yt-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── OVERLAY ── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: 
      linear-gradient(to top, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0.2) 30%, transparent 60%),
      linear-gradient(to bottom, rgba(10,10,10,0.7) 0%, transparent 20%);
  }

  /* ── INFO PANEL ── */
  .info {
    position: fixed;
    bottom: 160px;
    left: 32px;
    z-index: 20;
    max-width: 480px;
    transform: translateY(0);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
  }
  .info.hidden {
    transform: translateY(20px);
    opacity: 0;
  }

  .info-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--mg);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 12px;
  }

  .info-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1.5px;
    color: var(--txt);
    margin-bottom: 10px;
  }

  .info-desc {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--muted);
    max-width: 380px;
  }

  .info-meta {
    margin-top: 14px;
    display: flex;
    gap: 20px;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .meta-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .meta-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--cy);
  }

  /* ── TIMELINE / PROGRESS ── */
  .timeline-wrap {
    position: fixed;
    bottom: 130px;
    left: 32px;
    right: 32px;
    z-index: 30;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .progress-segments {
    display: flex;
    gap: 3px;
    height: 3px;
  }
  .seg {
    flex: 1;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  .seg:hover { transform: scaleY(2.5); }
  .seg-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: background-color 0.3s ease;
  }
  .seg.done .seg-fill { width: 100%; }
  .seg.active .seg-fill { background: var(--cy); width: 100%; animation: segAnim 0.4s ease forwards; }
  .seg.done .seg-fill { background: rgba(255,255,255,0.5); }
  @keyframes segAnim { from { width: 0; } to { width: 100%; } }

  /* ── THUMBNAIL STRIP ── */
  .strip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 30;
    height: 120px;
    padding: 12px 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    background: linear-gradient(to top, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.7) 100%);
  }
  .strip::-webkit-scrollbar { display: none; }

  .thumb {
    flex-shrink: 0;
    width: 130px;
    height: 82px;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.25s ease, border-color 0.25s ease;
    background: #1a1a1a;
  }
  .thumb:hover { transform: scale(1.05); }
  .thumb.active {
    border-color: var(--mg);
    transform: scale(1.06);
  }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    display: block;
  }
  .thumb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 4px 8px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.9);
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }
  .thumb-num {
    position: absolute;
    top: 6px; left: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
  }
  .thumb.active .thumb-num { color: var(--mg); }

  /* ── CONTROLS ── */
  .controls {
    position: fixed;
    bottom: 145px;
    right: 32px;
    z-index: 30;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .ctrl-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: var(--txt);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    backdrop-filter: blur(4px);
  }
  .ctrl-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    transform: scale(1.08);
  }
  .ctrl-btn svg { width: 18px; height: 18px; }
  .ctrl-btn.play-pause { width: 52px; height: 52px; }
  .ctrl-btn.play-pause svg { width: 22px; height: 22px; }

  /* ── TRANSITION FLASH ── */
  .flash {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--mg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease;
  }
  .flash.show { opacity: 0.12; }

  /* ── LOADING ── */
  .loading-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.6s ease;
  }
  .loading-screen.gone {
    opacity: 0;
    pointer-events: none;
  }
  .loading-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--txt);
  }
  .loading-logo em {
    font-style: normal;
    color: var(--mg);
  }
  .loading-bar {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mg), var(--cy));
    border-radius: 1px;
    animation: loadAnim 1.2s ease forwards;
  }
  @keyframes loadAnim {
    from { width: 0; }
    to { width: 100%; }
  }
  .loading-hint {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── YT PLAY HINT ── */
  .yt-hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 25;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .yt-hint.show { opacity: 1; }
  .yt-hint-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
  }
  .yt-hint-icon svg { width: 28px; height: 28px; fill: var(--cy); }
  .yt-hint p {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loading-screen" id="loadScreen">
  <div class="loading-logo">PORT<em>·</em>FOLIO</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-hint">Cargando reel</div>
</div>

<!-- Flash transition -->
<div class="flash" id="flash"></div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ISABELA
  </div>
  <div class="header-right">
    <div class="counter">Video <span id="curNum">01</span> / <span id="totNum">05</span></div>
  </div>
</header>

<!-- Video stage: YouTube iframes -->
<div class="stage" id="stage"></div>

<!-- Overlay gradient -->
<div class="overlay"></div>

<!-- Play hint -->
<div class="yt-hint" id="ytHint">
  <div class="yt-hint-icon">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  </div>
  <p>Haz clic para reproducir</p>
</div>

<!-- Info panel -->
<div class="info" id="infoPanel">
  <div class="info-tag" id="infoTag">REEL</div>
  <div class="info-title" id="infoTitle">Sin título</div>
  <div class="info-desc" id="infoDesc">—</div>
  <div class="info-meta">
    <div class="meta-item">
      <span class="meta-label">Año</span>
      <span class="meta-value" id="metaYear">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Categoría</span>
      <span class="meta-value" id="metaCat">—</span>
    </div>
  </div>
</div>

<!-- Timeline -->
<div class="timeline-wrap">
  <div class="progress-segments" id="segBar"></div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl-btn" id="nextBtn" title="Siguiente">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
    </svg>
  </button>
  <button class="ctrl-btn play-pause" id="playBtn" title="Abrir en YouTube">
    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
  </button>
  <button class="ctrl-btn" id="prevBtn" title="Anterior">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
    </svg>
  </button>
</div>

<!-- Thumbnail strip -->
<div class="strip" id="strip"></div>

<script>
const ACCENT_COLORS = ['#FF2D6B','#00E5FF','#FFE135','#A855F7','#22D3EE'];

// ── VIDEO DATA ──────────────────────────────────────────────────────────────
const VIDEOS = [
  {
    id: 'EOPnI3Dpbso',
    name: 'Coca Cola',
    cat: 'Publicidad',
    year: '2024',
    desc: 'Spot publicitario para Coca-Cola.'
  },
  {
    id: 'XJW-NLLdACQ',
    name: 'Puma',
    cat: 'Publicidad',
    year: '2024',
    desc: 'Campaña de marca para Puma.'
  },
  {
    id: 'zQl8AINmlUI',
    name: 'Kylie Cosmetics',
    cat: 'Beauty',
    year: '2024',
    desc: 'Producción audiovisual para Kylie Cosmetics.'
  },
  {
    id: 'syM7b_TYWtM',
    name: 'Popeyes',
    cat: 'Publicidad',
    year: '2024',
    desc: 'Campaña digital para Popeyes.'
  },
  {
    id: '-V7dpXG3ouY',
    name: 'Circuito de una Ardilla',
    cat: 'Motion',
    year: '2024',
    desc: 'Proyecto creativo: Circuito de una ardilla.'
  }
];

const state = { current: 0 };

const stage   = document.getElementById('stage');
const segBar  = document.getElementById('segBar');
const strip   = document.getElementById('strip');
const flash   = document.getElementById('flash');
const ytHint  = document.getElementById('ytHint');

// ── BUILD iframes ────────────────────────────────────────────────────────────
VIDEOS.forEach((v, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'yt-container' + (i === 0 ? ' active' : '');
  wrap.id = 'yt-' + i;

  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=${i === 0 ? 1 : 0}&mute=1&loop=1&playlist=${v.id}&controls=1&rel=0&modestbranding=1&enablejsapi=1`;
  iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
  iframe.allowFullscreen = true;

  wrap.appendChild(iframe);
  stage.appendChild(wrap);
});

// ── BUILD segments ───────────────────────────────────────────────────────────
function buildSegments() {
  segBar.innerHTML = '';
  VIDEOS.forEach((v, i) => {
    const seg = document.createElement('div');
    seg.className = 'seg' + (i === state.current ? ' active' : i < state.current ? ' done' : '');
    seg.innerHTML = '<div class="seg-fill"></div>';
    seg.addEventListener('click', () => loadVideo(i));
    segBar.appendChild(seg);
  });
}

// ── BUILD thumbnails ─────────────────────────────────────────────────────────
function buildThumbs() {
  strip.innerHTML = '';
  VIDEOS.forEach((v, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === state.current ? ' active' : '');

    const img = document.createElement('img');
    img.src = `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`;
    img.alt = v.name;
    img.loading = 'lazy';

    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = String(i + 1).padStart(2, '0');

    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.textContent = v.name;

    thumb.appendChild(img);
    thumb.appendChild(num);
    thumb.appendChild(label);
    thumb.addEventListener('click', () => loadVideo(i));
    strip.appendChild(thumb);
  });
}

// ── LOAD VIDEO ───────────────────────────────────────────────────────────────
function loadVideo(i) {
  const prev = state.current;
  state.current = i;

  // Flash
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 200);

  // Switch iframe visibility
  document.querySelectorAll('.yt-container').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });

  // Autoplay new iframe by reloading its src with autoplay=1
  const newIframe = document.querySelector(`#yt-${i} iframe`);
  const v = VIDEOS[i];
  newIframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&mute=0&loop=1&playlist=${v.id}&controls=1&rel=0&modestbranding=1&enablejsapi=1`;

  // Mute previous (reset src without autoplay)
  if (prev !== i) {
    const oldIframe = document.querySelector(`#yt-${prev} iframe`);
    const vp = VIDEOS[prev];
    oldIframe.src = `https://www.youtube.com/embed/${vp.id}?autoplay=0&mute=1&controls=1&rel=0&modestbranding=1`;
  }

  updateInfo(v, i);
  updateActiveUI(i);
}

function updateInfo(v, i) {
  document.getElementById('infoTag').textContent = `${String(i+1).padStart(2,'0')} / ${String(VIDEOS.length).padStart(2,'0')}`;
  document.getElementById('infoTitle').textContent = v.name;
  document.getElementById('infoDesc').textContent = v.desc || '';
  document.getElementById('metaYear').textContent = v.year || '—';
  document.getElementById('metaCat').textContent = v.cat || '—';
  document.getElementById('curNum').textContent = String(i+1).padStart(2,'0');
  document.documentElement.style.setProperty('--mg', ACCENT_COLORS[i % ACCENT_COLORS.length]);
}

function updateActiveUI(i) {
  document.querySelectorAll('.seg').forEach((s, idx) => {
    s.className = 'seg' + (idx === i ? ' active' : idx < i ? ' done' : '');
  });
  document.querySelectorAll('.thumb').forEach((t, idx) => {
    t.className = 'thumb' + (idx === i ? ' active' : '');
  });
  const thumbs = strip.querySelectorAll('.thumb');
  if (thumbs[i]) thumbs[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
document.getElementById('nextBtn').addEventListener('click', () => {
  loadVideo((state.current + 1) % VIDEOS.length);
});
document.getElementById('prevBtn').addEventListener('click', () => {
  loadVideo((state.current - 1 + VIDEOS.length) % VIDEOS.length);
});
document.getElementById('playBtn').addEventListener('click', () => {
  // Reload with autoplay to ensure playback (also unmuted)
  const v = VIDEOS[state.current];
  const iframe = document.querySelector(`#yt-${state.current} iframe`);
  iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1&loop=1&playlist=${v.id}`;
});

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'n') document.getElementById('nextBtn').click();
  if (e.key === 'ArrowLeft'  || e.key === 'p') document.getElementById('prevBtn').click();
});

// ── HIDE INFO ON IDLE ─────────────────────────────────────────────────────────
const infoPanel = document.getElementById('infoPanel');
let idleTimer;
function resetIdle() {
  infoPanel.classList.remove('hidden');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => infoPanel.classList.add('hidden'), 4000);
}
document.addEventListener('mousemove', resetIdle);
document.addEventListener('touchstart', resetIdle);
resetIdle();

// ── INIT ──────────────────────────────────────────────────────────────────────
setTimeout(() => document.getElementById('loadScreen').classList.add('gone'), 1400);
buildSegments();
buildThumbs();
updateInfo(VIDEOS[0], 0);
</script>
</body>
</html>
